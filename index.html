<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minta Maaf ke Lisah Cayaang 🥺💖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Langsung ke maaf -->
    <div class="card" id="apologyCard">
        <h1>LISAH CAYAANG, aku minta maaf 🥺💖</h1>
        <p id="apologyText">Aku gak bermaksud bikin kamu kesel.<br>Maafin aku ya? 😢</p>
        <div class="btn-group">
            <button id="yesBtn">Maafin 💖</button>
            <button id="noBtn">Enggak 😠</button>
        </div>
    </div>

    <!-- Footer (sudah diubah) -->
    <div class="footer">
        Dibuat khusus buat Lisah Cayaang 💕
    </div>

    <!-- Popup -->
    <div class="popup" id="popup">
        <div class="popup-content">
            <h2 id="popupTitle"></h2>
            <p id="popupMsg"></p>
            <div class="hearts" id="hearts"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
